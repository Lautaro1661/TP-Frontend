<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MateA | Registrarse</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="index">
    <header class="header">
      <nav class="navbar">
        <a href="../index.html">
          <img src="../img/logo.png" alt="Matea Logo" class="logo" />
        </a>
        <!-- Nav-->
        <ul class="nav-links">
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="cursos.html">Cursos</a></li>
          <li><a href="categorias.html">Categorias</a></li>
        </ul>
        <div>
          <a href="ingresar.html" class="button-login">Ingresar</a>
        </div>
      </nav>
    </header>
    <main class="registro-section">
      <h1>Registrate gratis</h1>

      <form class="registro-form">
        <div class="campo">
          <label for="nombre">Nombre completo</label>
          <input
            type="text"
            id="nombre"
            name="nombre"
            placeholder="Ej: Lautaro Varela"
            required
          />
        </div>

        <div class="campo">
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Ej: lautaro16@email.com"
          />
        </div>

        <div class="campo">
          <label for="telefono">Teléfono</label>
          <input
            type="tel"
            id="telefono"
            name="telefono"
            placeholder="Ej: +54 11 xxxx-xxxx"
            required
          />
        </div>

        <div class="campo">
          <label for="categoria">Categoría de interés</label>
          <select id="categoria" name="categoria">
            <option value="" disabled selected>Seleccioná una opción</option>
            <option value="programacion">
              Programación e Inteligencia Artificial
            </option>
            <option value="negocios">Negocios y Marketing</option>
            <option value="idiomas">Idiomas e Inglés</option>
          </select>
        </div>

        <div class="campo">
          <p class="opciones-label">¿Cómo nos conociste?</p>
          <div class="opciones-grupo">
            <label class="opcion">
              <input type="radio" name="origen" value="redes" /> Redes sociales
            </label>
            <label class="opcion">
              <input type="radio" name="origen" value="amigo" /> Un
              amigo/familiar/conocido me recomendó
            </label>
            <label class="opcion">
              <input type="radio" name="origen" value="buscador" /> Buscador
              (Google, firefox, etc)
            </label>
          </div>
        </div>

        <div class="campo">
          <label class="opcion">
            <input type="checkbox" name="terminos" required />
            Acepto los términos y condiciones
          </label>
        </div>

        <div class="botones">
          <button type="submit" class="btn-enviar">Registrarme</button>
          <button type="reset" class="btn-reset">Resetear</button>
        </div>
      </form>
    </main>

    <footer>
      <div class="footer-contenido">
        <div class="footer-marca">
          <img src="../img/logo.png" alt="MateA Logo" class="footer-logo" />
          <p>Cursos en línea para construir habilidades reales.</p>
        </div>

        <div class="footer-nav">
          <h4>Páginas</h4>
          <ul>
            <li><a href="../index.html">Inicio</a></li>
            <li><a href="cursos.html">Cursos</a></li>
            <li><a href="categorias.html">Categorías</a></li>
            <li><a href="ingresar.html">Ingresar</a></li>
          </ul>
        </div>

        <div class="footer-redes">
          <h4>Seguinos</h4>
          <div class="redes-links">
            <a href="https://www.instagram.com/" target="_blank">
              <img
                src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/instagram.svg"
                alt="Instagram"
              />
              Instagram
            </a>
            <a href="https://www.facebook.com/?locale=es_LA" target="_blank">
              <img
                src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/facebook.svg"
                alt="Facebook"
              />
              Facebook
            </a>
          </div>
        </div>
      </div>
      <div class="footer-copy">
        <p>&copy; 2026 MateA. Todos los derechos reservados.</p>
      </div>
    </footer>
  </body>
</html>
